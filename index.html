<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Pendulum Simulator</title>
    <!-- Main theme + layout -->
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/controls.css" />
    <link rel="stylesheet" href="styles/canvas.css" />
</head>

<body>
    <div id="app-container">
        <div id="control-panel">
            <h1>Pendulum Simulator</h1>

            <!-- Mode toggle -->
            <fieldset class="control-group">
                <legend class="control-label">Mode</legend>

                <label>
                    <input type="radio" name="mode" value="single" id="modeSingle" checked />
                    Single pendulum
                </label>

                <label>
                    <input type="radio" name="mode" value="wave" id="modeWave" />
                    Wave machine
                </label>
            </fieldset>


            <!-- Gravity -->
            <div class="control-group">
                <label for="gravitySlider" class="control-label">
                    Gravity: <span id="gravityValue">9.8 m/s²</span>
                </label>
                <input type="range" id="gravitySlider" min="1" max="20" step="0.1" value="9.8" />
            </div>

            <!-- Length / Base length -->
            <div class="control-group">
                <label for="lengthSlider" class="control-label">
                    <span id="lengthLabel">Length</span>:
                    <span id="lengthValue">1.0 m</span>
                </label>
                <input type="range" id="lengthSlider" min="0.5" max="2.0" step="0.05" value="1.0" />
            </div>
            <div class="control-group" id="periodDisplay">
                <label class="control-label" for="periodValue">Time Period:</label>
                <output id="periodValue" class="value" aria-live="polite">—</output>

                <label class="control-label" for="frequencyValue">Frequency:</label>
                <output id="frequencyValue" class="value" aria-live="polite">—</output>
            </div>
            <!-- Buttons -->
            <div class="button-row">
                <button id="btnPause">Pause</button>
                <button id="btnReset">Reset</button>
            </div>

            <!-- Info panel (optional, existing) -->
            <details>
                <summary>About this simulation</summary>
                <p>
                    Explore a single pendulum or a pendulum wave machine with different lengths and periods.
                    The time period depends on gravity (g) and length (l) according to:
                </p>
                <pre>T = 2π √(l / g)</pre>
                <p>
                    For small angles, the pendulum exhibits Simple Harmonic Motion (SHM).
                </p>
            </details>
        </div>

        <div id="canvas-container">
            <canvas id="pendulumCanvas"></canvas>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
